name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_release:
        description: "Skip GitHub Release upload (build only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: cache cargo target
        uses: actions/cache@v4
        with:
          path: apps/frontend/src-tauri/target/
          key: cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-

      - name: cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev patchelf

      - name: install stock tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - name: build deb
        run: cargo tauri build --bundles deb
        working-directory: apps/frontend/src-tauri

      - name: verify deb artifact
        run: |
          ls -la target/release/bundle/deb/
          test -n "$(ls target/release/bundle/deb/*.deb 2>/dev/null)" || { echo "No .deb produced!"; exit 1; }
        working-directory: apps/frontend/src-tauri

      - name: validate deb contents
        run: |
          DEB_FILE=$(ls target/release/bundle/deb/robot-controller_*.deb 2>/dev/null | head -1)
          echo "=== dpkg -c on $DEB_FILE ==="
          dpkg -c "$DEB_FILE"
          echo "=== Package info ==="
          dpkg --info "$DEB_FILE"
          echo "=== Binary exists ==="
          dpkg -c "$DEB_FILE" | grep "usr/bin/robot-controller" || { echo "ERROR: robot-controller binary not in deb"; exit 1; }
          echo "=== Desktop file exists ==="
          dpkg -c "$DEB_FILE" | grep "usr/share/applications/robot-controller.desktop" || { echo "ERROR: .desktop file not in deb"; exit 1; }
        working-directory: apps/frontend/src-tauri

      - name: copy deb to flatpak directory
        run: cp apps/frontend/src-tauri/target/release/bundle/deb/*.deb flatpak/robot-controller.deb

      - name: verify flatpak sources
        run: |
          test -f flatpak/robot-controller.deb || { echo "Missing robot-controller.deb"; exit 1; }
          test -f flatpak/com.ks0555.robotcontroller.yaml || { echo "Missing manifest"; exit 1; }
          test -f flatpak/com.ks0555.robotcontroller.metainfo.xml || { echo "Missing metainfo"; exit 1; }
          for icon in icons/32x32/com.ks0555.robotcontroller.png icons/128x128/com.ks0555.robotcontroller.png icons/256x256@2/com.ks0555.robotcontroller.png; do
            test -f "flatpak/$icon" || { echo "Missing $icon"; exit 1; }
          done
          echo "All flatpak sources verified"

      - name: extract version
        run: |
          echo "VERSION=$(cargo metadata --format-version 1 --no-deps --manifest-path apps/frontend/src-tauri/Cargo.toml | jq -r '.packages[] | select(.name == \"robot-controller\") | .version')" >> $GITHUB_ENV

      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-controller-deb
          path: apps/frontend/src-tauri/target/release/bundle/deb/robot-controller_${{ env.VERSION }}_amd64.deb
          retention-days: 7

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: RobotController-${{ env.VERSION }}-x86_64.flatpak
          manifest-path: flatpak/com.ks0555.robotcontroller.yaml
          cache-key: flatpak-${{ runner.os }}-${{ hashFiles('flatpak/com.ks0555.robotcontroller.yaml') }}-freedesktop-2408
          cache: true

      - name: generate sha256 checksum
        run: |
          sha256sum RobotController-${VERSION}-x86_64.flatpak > RobotController-${VERSION}-x86_64.flatpak.sha256

      - name: upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-controller-flatpak
          path: |
            RobotController-${{ env.VERSION }}-x86_64.flatpak
            RobotController-${{ env.VERSION }}-x86_64.flatpak.sha256
          retention-days: 7

      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/') && inputs.skip_release != true
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RobotController-${{ env.VERSION }}-x86_64.flatpak
            RobotController-${{ env.VERSION }}-x86_64.flatpak.sha256
