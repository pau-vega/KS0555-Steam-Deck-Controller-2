name: Build and Release

on:
  push:
    tags: ["v*", "*-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_release:
        description: "Skip GitHub Release upload (build only)"
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (defaults to github.ref)"
        type: string
        required: false
        default: ""
      tag_name:
        description: "Release tag to upload artifacts to"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: cache cargo target
        uses: actions/cache@v4
        with:
          path: apps/frontend/src-tauri/target/
          key: cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-target-

      - name: cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: install system dependencies
        timeout-minutes: 10
        run: |
          sudo sed -i 's|azure.archive.ubuntu.com|archive.ubuntu.com|g' /etc/apt/sources.list /etc/apt/apt-mirrors.txt 2>/dev/null || true
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y -o Acquire::Retries=3 \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libudev-dev patchelf flatpak flatpak-builder

      - name: install stock tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - name: clean stale tauri cache
        run: |
          set -e
          STALE_DIRS=$(find apps/frontend/src-tauri/target/release/build/tauri-* -name 'permissions' -maxdepth 1 -type d 2>/dev/null || true)
          if [ -n "$STALE_DIRS" ]; then
            echo "Removing stale Tauri permissions cache (absolute path drift from previous CI runner)"
            rm -rf apps/frontend/src-tauri/target/release/build/tauri-*/out/permissions/
          else
            echo "No stale permissions cache found"
          fi
        shell: bash

      - name: build deb
        run: cargo tauri build --bundles deb
        working-directory: apps/frontend/src-tauri

      - name: verify deb artifact
        run: |
          ls -la target/release/bundle/deb/
          test -n "$(ls target/release/bundle/deb/*.deb 2>/dev/null)" || { echo "No .deb produced!"; exit 1; }
        working-directory: apps/frontend/src-tauri

      - name: validate deb contents
        run: |
          DEB_FILE=$(ls target/release/bundle/deb/*.deb 2>/dev/null | head -1)
          echo "=== dpkg -c on $DEB_FILE ==="
          dpkg -c "$DEB_FILE"
          echo "=== Package info ==="
          dpkg --info "$DEB_FILE"
          echo "=== Binary exists ==="
          dpkg -c "$DEB_FILE" | grep "usr/bin/robot-controller" || { echo "ERROR: robot-controller binary not in deb"; exit 1; }
          echo "=== Desktop file exists ==="
          dpkg -c "$DEB_FILE" | grep -i "usr/share/applications/.*\.desktop" || { echo "ERROR: .desktop file not in deb"; exit 1; }
        working-directory: apps/frontend/src-tauri

      - name: copy deb to flatpak directory
        run: cp apps/frontend/src-tauri/target/release/bundle/deb/*.deb flatpak/robot-controller.deb

      - name: verify flatpak sources
        run: |
          test -f flatpak/robot-controller.deb || { echo "Missing robot-controller.deb"; exit 1; }
          test -f flatpak/com.ks0555.robotcontroller.yaml || { echo "Missing manifest"; exit 1; }
          test -f flatpak/com.ks0555.robotcontroller.metainfo.xml || { echo "Missing metainfo"; exit 1; }
          for icon in icons/32x32/com.ks0555.robotcontroller.png icons/128x128/com.ks0555.robotcontroller.png icons/256x256@2/com.ks0555.robotcontroller.png; do
            test -f "flatpak/$icon" || { echo "Missing $icon"; exit 1; }
          done
          echo "All flatpak sources verified"

      - name: extract version
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            TAG="${{ inputs.tag_name }}"
            VERSION="${TAG##*v}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG##*v}"
          else
            VERSION=$(grep '^version' apps/frontend/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-controller-deb
          path: apps/frontend/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: configure flathub remote
        run: sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: install flatpak runtime
        run: |
          sudo flatpak install --system -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: build flatpak
        run: |
          sudo flatpak-builder --system --install --force-clean --disable-rofiles-fuse build-dir flatpak/com.ks0555.robotcontroller.yaml
          mkdir -p repo
          flatpak build-export repo build-dir
          flatpak build-bundle repo RobotController-${VERSION}-x86_64.flatpak com.ks0555.robotcontroller

      - name: generate sha256 checksum
        run: |
          sha256sum RobotController-${VERSION}-x86_64.flatpak > RobotController-${VERSION}-x86_64.flatpak.sha256

      - name: upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-controller-flatpak
          path: |
            RobotController-${{ env.VERSION }}-x86_64.flatpak
            RobotController-${{ env.VERSION }}-x86_64.flatpak.sha256
          retention-days: 7

      - name: upload to release
        if: inputs.tag_name != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |
            RobotController-${{ env.VERSION }}-x86_64.flatpak
            RobotController-${{ env.VERSION }}-x86_64.flatpak.sha256
