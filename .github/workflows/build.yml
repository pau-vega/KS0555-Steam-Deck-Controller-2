name: Build Tauri AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev patchelf

      - name: install custom tauri-cli (truly portable AppImage)
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - name: build AppImage (new sharun format)
        run: |
          cargo tauri build \
            --config '{"bundle":{"linux":{"appimage":{"useNewFormat":true}}}}'
        working-directory: apps/frontend/src-tauri

      - name: rename AppImage with arch suffix
        run: |
          cd apps/frontend/src-tauri/target/release/bundle/appimage
          for f in *.AppImage; do
            mv "$f" "RobotController-x86_64.AppImage"
          done

      - name: upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-x64
          path: apps/frontend/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: attach x64 AppImage to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libudev-dev patchelf

      - name: install custom tauri-cli (truly portable AppImage)
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - name: build AppImage (new sharun format)
        run: |
          cargo tauri build \
            --target aarch64-unknown-linux-gnu \
            --config '{"bundle":{"linux":{"appimage":{"useNewFormat":true}}}}'
        working-directory: apps/frontend/src-tauri

      - name: rename AppImage with arch suffix
        run: |
          cd apps/frontend/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage
          for f in *.AppImage; do
            mv "$f" "RobotController-aarch64.AppImage"
          done

      - name: upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-arm64
          path: apps/frontend/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

      - name: attach arm64 AppImage to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/frontend/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/frontend/src-tauri
          args: --target universal-apple-darwin

      - name: rename DMG with arch suffix
        run: |
          cd apps/frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg
          for f in *.dmg; do
            mv "$f" "RobotController-universal.dmg"
          done

      - name: upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DMG-macos
          path: apps/frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: attach DMG to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
